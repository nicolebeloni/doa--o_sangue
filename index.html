<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
 <header> 
        <h1> Doe sangue e salve vidas!</h1>
    </header>

    <h2>Cadastre-se</h2>

<form>
    <div>
<label for="nome">informe seu nome completo</label>
<input type="text" id= "nome" required />
</div>

<div>
<label for="email">informe o email</label>
<input type="text" id= "email" required />
</div>

 <div>
<label for="idade">informe sua idade</label>
<input type="number" id= "idade" required />
</div>

 <div>
<label for="peso">informe o seu peso</label>
<input type="number" id= "peso" required />
</div>

 <div>
<label for="sanguineo">qual seu tipo sanguíneo?</label>
<select id="sanguineo" name="sanguineo">
  <option value="A+">A+</option>
  <option value="A-">A-</option>
  <option value=" B+"> B+</option>
  <option value=" B-"> B-</option>
  <option value=" AB+"> AB+</option>
  <option value=" AB-"> AB-</option>
  <option value=" O+"> O+</option>
  <option value="  O-">O-</option>
</select>
</div>

 <div>
<label for="telefone">informe o telefone</label>
<input type="number" id= "telefone" required />
</div>

<div>
<label for="cidade">informe sua cidade</label>
<input type="text" id= "cidade" required />
</div>

<div>
<label for="estado">informe seu estado</label>
<input type="text" id= "estado" required />
</div>

<button type="button" onclick = "formulario()">Cadastre-se</button>

</form>


<script src= "script.js"></script>



</body>
</html>
